name: MirAI
options:
  bundleIdPrefix: com.vlad.mirai
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5"
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_IDENTITY: ""
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm/
    branch: main

targets:
  MirAI:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.vlad.mirai
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "MirAI needs microphone access for voice conversations."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "MirAI uses on-device speech recognition to transcribe your voice."
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: "MirAI"
        INFOPLIST_KEY_UIBackgroundModes: "audio"
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - sdk: Speech.framework
      - sdk: AVFoundation.framework
